name: ciel_app
description: Ciel — tynn klient (nettbrett) som snakkar med PC-hjernen.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  google_mlkit_digital_ink_recognition: ^0.14.2
  flutter_overlay_window: ^0.5.0
  local_auth: ^3.0.1
  crypto: ^3.0.7
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/ciel_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/ciel_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
